<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>DuckDodge</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden; background: #000;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }

  body { display: flex; flex-direction: column; }

  #game-wrap {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #000;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    touch-action: none;
  }

  /* ── Controller ─────────────────────────────────────────── */
  #controller {
    display: none;               /* shown via JS on touch devices */
    flex-shrink: 0;
    align-items: center;
    justify-content: space-between;
    background: #111122;
    border-top: 3px solid #2A2A44;
    height: clamp(130px, 26vh, 185px);
    padding: 8px 32px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #controller { height: clamp(90px, 32vh, 130px); padding: 4px 28px; }
  }

  /* ── D-pad ──────────────────────────────────────────────── */
  #dpad-wrap { display: flex; align-items: center; justify-content: center; }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, clamp(38px, 11vw, 52px));
    grid-template-rows:    repeat(3, clamp(38px, 11vw, 52px));
    gap: 2px;
  }

  /* Corners — blend with controller background (creates cross cutout) */
  .dc { background: #111122; border-radius: 3px; }

  /* D-pad center piece */
  .dm {
    background: #3A3A55;
    box-shadow: inset 1px 1px 0 #555570, inset -1px -1px 0 #1E1E30;
  }

  /* Directional arms */
  .dp {
    background: #4A4A68;
    display: flex; align-items: center; justify-content: center;
    color: #888899; font-size: clamp(11px, 3vw, 15px);
    font-family: 'Courier New', monospace; font-weight: bold;
    cursor: pointer;
    box-shadow: inset 2px 2px 0 #6A6A88, inset -2px -2px 0 #22223A;
    transition: background 0.06s;
  }
  .dp.pressed {
    background: #2E2E48;
    box-shadow: inset 2px 2px 0 #18182E, inset -2px -2px 0 #6A6A88;
    color: #555566;
  }

  /* ── A / B buttons ──────────────────────────────────────── */
  #ab-wrap {
    display: flex; align-items: flex-end;
    gap: clamp(10px, 3vw, 18px);
  }

  .ab-btn {
    position: relative; overflow: hidden;
    width:  clamp(50px, 14vw, 66px);
    height: clamp(50px, 14vw, 66px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(16px, 5vw, 22px);
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: #FFFFFF;
    cursor: pointer;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.5), inset 3px 3px 0 rgba(255,255,255,0.18);
    transition: transform 0.06s, box-shadow 0.06s;
  }
  .ab-btn.pressed {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  #btn-b {
    background: #1155CC;
    margin-bottom: clamp(16px, 5vw, 26px);   /* B sits higher (Game Boy layout) */
  }
  #btn-b.ready { background: #1155CC; }
  #btn-b.cooldown { background: #0A3580; }

  #btn-a { background: #CC2200; }

  /* Cooldown overlay inside B — fills from top, shrinks as cooldown expires */
  #b-cd {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 0%;
    background: rgba(0,0,0,0.62);
    border-radius: 50%;
    pointer-events: none;
    transition: height 0.12s linear;
  }

  /* Label span sits above overlay */
  .ab-label { position: relative; z-index: 1; }

  /* ── Controller center label ────────────────────────────── */
  #ctrl-mid {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  #ctrl-mid .logo {
    font-family: 'Courier New', monospace;
    font-size: clamp(9px, 2.5vw, 13px);
    font-weight: bold; letter-spacing: 2px;
    color: #44446A; line-height: 1.2;
    text-align: center;
  }
  /* Retro speaker dots */
  #ctrl-mid .speaker {
    width: 4px; height: 4px; background: #2A2A44;
    box-shadow:
      8px 0 0 #2A2A44, 16px 0 0 #2A2A44,
      0 6px 0 #2A2A44, 8px 6px 0 #2A2A44, 16px 6px 0 #2A2A44,
      0 12px 0 #2A2A44, 8px 12px 0 #2A2A44, 16px 12px 0 #2A2A44;
  }
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="c"></canvas>
</div>

<div id="controller">
  <!-- D-pad -->
  <div id="dpad-wrap">
    <div class="dpad">
      <div class="dc"></div>
      <div class="dp" id="dp-up">▲</div>
      <div class="dc"></div>
      <div class="dp" id="dp-left">◀</div>
      <div class="dm"></div>
      <div class="dp" id="dp-right">▶</div>
      <div class="dc"></div>
      <div class="dp" id="dp-down">▼</div>
      <div class="dc"></div>
    </div>
  </div>

  <!-- Center label -->
  <div id="ctrl-mid">
    <div class="logo">DUCK<br>DODGE</div>
    <div class="speaker"></div>
  </div>

  <!-- A / B buttons -->
  <div id="ab-wrap">
    <div id="btn-b" class="ab-btn">
      <div id="b-cd"></div>
      <span class="ab-label" id="b-label">B</span>
    </div>
    <div id="btn-a" class="ab-btn">
      <span class="ab-label">A</span>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Canvas ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const VW = 800, VH = 500;
canvas.width = VW; canvas.height = VH;

function resize() {
  const wrap = document.getElementById('game-wrap');
  const s = Math.min((wrap.clientWidth || window.innerWidth)  / VW,
                     (wrap.clientHeight || window.innerHeight) / VH);
  canvas.style.width  = Math.floor(VW * s) + 'px';
  canvas.style.height = Math.floor(VH * s) + 'px';
}
window.addEventListener('resize', () => requestAnimationFrame(resize));
window.addEventListener('orientationchange', () => setTimeout(resize, 220));

// ─── Constants ────────────────────────────────────────────
const GROUND_Y  = 415;
const GRASS_H   = 18;
const DUCK_W    = 36;
const DUCK_H    = 30;
const DUCK_SPD  = 250;
const JUMP_H    = 48;
const JUMP_DUR  = 0.46;
const WIGGLE_CD = 20;   // B button cooldown (seconds)

const TREES = [
  { x:  85, th:  95, cw:  95, ch: 105 },
  { x: 235, th:  80, cw:  82, ch:  88 },
  { x: 390, th: 105, cw: 100, ch: 112 },
  { x: 560, th:  88, cw:  90, ch:  96 },
  { x: 715, th:  78, cw:  78, ch:  84 },
];
const CLOUDS = [
  { x:  90, y: 55, w:  84, h: 30 },
  { x: 340, y: 38, w: 104, h: 36 },
  { x: 590, y: 65, w:  78, h: 28 },
];
const STARS = [[80,30],[200,15],[350,50],[500,20],[650,40],[730,25],
               [120,80],[420,65],[580,85],[280,45],[470,28],[160,60]];

// ─── Audio ────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type, vol, freqEnd) {
  type = type || 'square'; vol = vol || 0.22;
  freqEnd = (freqEnd !== undefined) ? freqEnd : null;
  try {
    const ac = getACtx();
    if (ac.state === 'suspended') ac.resume();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd !== null) o.frequency.linearRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(ac.currentTime); o.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}
const SND = {
  jump:      () => beep(330, 0.09, 'square', 0.18, 580),
  land:      () => beep(90,  0.08, 'square', 0.26),
  golden:    () => { beep(880,0.08,'triangle',0.2); setTimeout(()=>beep(1100,0.1,'triangle',0.15),80); },
  death:     () => beep(440, 0.38, 'square', 0.38, 100),
  milestone: () => {
    beep(523,0.08,'square',0.2);
    setTimeout(()=>beep(659,0.08,'square',0.2),95);
    setTimeout(()=>beep(784,0.14,'square',0.25),190);
  },
  shield:    () => {
    beep(440,0.06,'square',0.2);
    setTimeout(()=>beep(660,0.06,'square',0.22),70);
    setTimeout(()=>beep(880,0.12,'square',0.28),140);
  },
  shielded:  () => beep(180, 0.14, 'square', 0.22, 80),
  combo:     () => {
    beep(523,0.07,'square',0.25);
    setTimeout(()=>beep(659,0.07,'square',0.25),80);
    setTimeout(()=>beep(784,0.07,'square',0.25),160);
    setTimeout(()=>beep(1047,0.2,'square',0.32),240);
  },
  rain:      () => {
    beep(220,0.1,'square',0.28,440);
    setTimeout(()=>beep(220,0.1,'square',0.28,440),200);
    setTimeout(()=>beep(220,0.1,'square',0.28,440),400);
  },
  wind:      () => beep(110, 0.6, 'sawtooth', 0.07, 260),
  wiggle:    () => {
    [523,659,784,659,784,1047].forEach((n,i) =>
      setTimeout(() => beep(n, 0.07, 'square', 0.2), i * 58));
  },
};

// ─── Apple type definitions ───────────────────────────────
const APPLE_DEF = {
  small:  { size: 18, pts: 1, spd: 370, w: 38 },
  normal: { size: 28, pts: 1, spd: 230, w: 43 },
  golden: { size: 28, pts: 2, spd: 210, w: 14 },
  shield: { size: 24, pts: 0, spd: 185, w:  5 },
};

// ─── Game state ───────────────────────────────────────────
let state       = 'playing';
let score       = 0;
let highScore   = parseInt(localStorage.getItem('duckAppleHS') || '0');
let gameTime    = 0;
let lastDiffUp  = 0;
let speedMult   = 1.0;
let spawnMs     = 1200;
let lastSpawnTs = 0;
let apples      = [];
let splats      = [];

// Combo
let combo       = 0;
let comboX2     = false;
let comboFlashT = 0;

// Shield (apple pickup)
let shieldActive    = false;
let shieldTimer     = 0;
let shieldOnScreen  = false;

// Wiggle shield (B button)
let wiggleActive   = false;
let wiggleT        = 0;
let wiggleOff      = 0;   // visual-only X offset (±10 px)
let wiggleCooldown = 0;

// Wind
let windActive  = false;
let windVel     = 0;
let windTimer   = 0;
let lastWindT   = 0;
let windStreaks  = [];

// Screen shake
let shakeT   = 0;
let shakeAmt = 0;

// Apple rain
let rainMilestone = 50;
let rainWarnT     = 0;

// Death animation
let deathT = 0;

// ─── Duck ─────────────────────────────────────────────────
let duck = {};
function resetDuck() {
  duck.x        = VW / 2 - DUCK_W / 2;
  duck.y        = GROUND_Y - DUCK_H;
  duck.right    = true;
  duck.jumping  = false;
  duck.jumpT    = 0;
  duck.jumpOff  = 0;
  duck.walkAnim = 0;
}
resetDuck();

// ─── Keyboard input ───────────────────────────────────────
const keys = {};
window.addEventListener('keydown', function(e) {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.code) !== -1) e.preventDefault();
  if (!keys[e.code] && (e.code === 'Space' || e.code === 'ArrowUp') && !duck.jumping && state === 'playing') {
    duck.jumping = true; duck.jumpT = 0; SND.jump();
  }
  if (!keys[e.code] && e.code === 'KeyB') activateWiggle();
  keys[e.code] = true;
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

// ─── Canvas click (respawn button) ────────────────────────
const BTN = { x: VW/2-110, y: VH/2+90, w: 220, h: 52 };
canvas.addEventListener('click', function(e) {
  if (state !== 'dead') return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (VW / rect.width);
  const cy = (e.clientY - rect.top)  * (VH / rect.height);
  if (cx >= BTN.x && cx <= BTN.x+BTN.w && cy >= BTN.y && cy <= BTN.y+BTN.h) respawn();
});
canvas.addEventListener('touchend', function(e) {
  if (state !== 'dead') return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const cx = (t.clientX - rect.left) * (VW / rect.width);
  const cy = (t.clientY - rect.top)  * (VH / rect.height);
  if (cx >= BTN.x && cx <= BTN.x+BTN.w && cy >= BTN.y && cy <= BTN.y+BTN.h) respawn();
}, { passive: false });
canvas.addEventListener('mousemove', function(e) {
  if (state !== 'dead') { canvas.style.cursor = 'default'; return; }
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (VW / rect.width);
  const cy = (e.clientY - rect.top)  * (VH / rect.height);
  canvas.style.cursor =
    (cx >= BTN.x && cx <= BTN.x+BTN.w && cy >= BTN.y && cy <= BTN.y+BTN.h) ? 'pointer' : 'default';
});

// ─── Apple helpers ────────────────────────────────────────
function pickType() {
  var rv = Math.random() * 100;
  if (rv < 38) return 'small';
  if (rv < 81) return 'normal';
  if (rv < 95) return 'golden';
  return shieldOnScreen ? 'small' : 'shield';
}
function makeApple(type, xPos, startY) {
  const D = APPLE_DEF[type];
  if (xPos === undefined) xPos = D.size + Math.random() * (VW - D.size * 2);
  if (startY === undefined) startY = -D.size - 5;
  if (type === 'shield') shieldOnScreen = true;
  return { type, x: xPos, y: startY, size: D.size, pts: D.pts,
           spd: D.spd * speedMult, velX: windActive ? windVel : 0,
           bouncing: false, bounceV: 0 };
}
function spawnApple(now) { lastSpawnTs = now; apples.push(makeApple(pickType())); }
function spawnRain() {
  SND.rain(); rainWarnT = 1.8;
  for (var i=0; i<9; i++) {
    var xPos = VW*(i+0.5)/9 + (Math.random()-0.5)*40;
    xPos = Math.max(30, Math.min(VW-30, xPos));
    var a = makeApple(i===4?'golden':'normal', xPos);
    a.y = -(i%3)*45 - 10;
    apples.push(a);
  }
}
function addSplat(a) {
  splats.push({ x:a.x, y:GROUND_Y+2, age:0,
    col: a.type==='golden'?'#BB7700':a.type==='shield'?'#0055AA':'#880000', sz:a.size });
}

// ─── Wiggle shield ────────────────────────────────────────
function activateWiggle() {
  if (wiggleCooldown > 0 || state !== 'playing') return;
  wiggleActive   = true;
  wiggleT        = 0;
  wiggleCooldown = WIGGLE_CD;
  shieldActive   = true;
  shieldTimer    = Math.max(shieldTimer || 0, 3);
  SND.wiggle();
}

// ─── Respawn ──────────────────────────────────────────────
function respawn() {
  score=0; gameTime=0; lastDiffUp=0; speedMult=1.0;
  spawnMs=1200; lastSpawnTs=0; apples=[]; splats=[];
  combo=0; comboX2=false; comboFlashT=0;
  shieldActive=false; shieldTimer=0; shieldOnScreen=false;
  wiggleActive=false; wiggleT=0; wiggleOff=0; wiggleCooldown=0;
  windActive=false; windVel=0; windTimer=0; lastWindT=0; windStreaks=[];
  shakeT=0; shakeAmt=0; rainMilestone=50; rainWarnT=0; deathT=0;
  state='playing'; canvas.style.cursor='default';
  resetDuck();
}

// ─── Sky colour (day/night cycle, 300 s period) ───────────
const SKY_KF = [
  { t:   0, c: ['#1A4A8A','#2E6BB0','#5090CC'] },
  { t: 100, c: ['#8B3A00','#CC5500','#FF8833'] },
  { t: 180, c: ['#080820','#121240','#1C2060'] },
  { t: 250, c: ['#3A1A5A','#663380','#9955AA'] },
  { t: 300, c: ['#1A4A8A','#2E6BB0','#5090CC'] },
];
function lerp3(c1,c2,t) {
  function p(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
  function h(n){var s=Math.round(n).toString(16);return s.length<2?'0'+s:s;}
  var a=p(c1),b=p(c2);
  return '#'+h(a[0]+(b[0]-a[0])*t)+h(a[1]+(b[1]-a[1])*t)+h(a[2]+(b[2]-a[2])*t);
}
function getSky() {
  var t=gameTime%300;
  for(var i=0;i<SKY_KF.length-1;i++){
    var k0=SKY_KF[i],k1=SKY_KF[i+1];
    if(t>=k0.t&&t<k1.t){var f=(t-k0.t)/(k1.t-k0.t);
      return[lerp3(k0.c[0],k1.c[0],f),lerp3(k0.c[1],k1.c[1],f),lerp3(k0.c[2],k1.c[2],f)];}
  }
  return SKY_KF[0].c;
}
function nightFactor() {
  var t=gameTime%300;
  if(t<100)return 0; if(t<180)return(t-100)/80; if(t<250)return 1; return 1-(t-250)/50;
}

// ─── Update ───────────────────────────────────────────────
let lastTime = null;
function update(now) {
  if (lastTime===null) lastTime=now;
  var dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;

  if (state==='dying') { deathT+=dt; if(deathT>=0.45) state='dead'; return; }
  if (state!=='playing') return;

  gameTime += dt;

  // Difficulty ramp
  if (gameTime-lastDiffUp >= 60) {
    lastDiffUp=gameTime; speedMult*=1.15; spawnMs=Math.max(380,spawnMs*0.87);
    for(var di=0;di<apples.length;di++) if(!apples[di].bouncing) apples[di].spd=APPLE_DEF[apples[di].type].spd*speedMult;
  }

  // Shield timer
  if (shieldActive) { shieldTimer-=dt; if(shieldTimer<=0) shieldActive=false; }

  // Wiggle dance animation
  if (wiggleActive) {
    wiggleT += dt;
    wiggleOff = Math.sin(wiggleT * 32) * 10;
    if (wiggleT >= 3) { wiggleActive=false; wiggleOff=0; }
  }
  if (wiggleCooldown > 0) wiggleCooldown = Math.max(0, wiggleCooldown-dt);

  // Combo flash
  if (comboFlashT>0) comboFlashT-=dt;

  // Wind
  if (!windActive && gameTime-lastWindT>=30) {
    windActive=true; lastWindT=gameTime; windTimer=2.5;
    windVel=(Math.random()<0.5?1:-1)*(160+Math.random()*80);
    windStreaks=[];
    for(var ws=0;ws<7;ws++) windStreaks.push({x:Math.random()*VW,y:20+Math.random()*380,len:55+Math.random()*90});
    for(var wa=0;wa<apples.length;wa++) if(!apples[wa].bouncing) apples[wa].velX=windVel;
    SND.wind();
  }
  if (windActive) {
    windTimer-=dt;
    for(var wsi=0;wsi<windStreaks.length;wsi++){
      windStreaks[wsi].x+=windVel*dt*0.7;
      if(windStreaks[wsi].x>VW+120) windStreaks[wsi].x-=VW+240;
      if(windStreaks[wsi].x<-120)   windStreaks[wsi].x+=VW+240;
    }
    if(windTimer<=0){windActive=false;windVel=0;for(var we=0;we<apples.length;we++)apples[we].velX=0;}
  }

  if(rainWarnT>0) rainWarnT-=dt;
  if(shakeT>0) shakeT-=dt;

  // Duck movement
  var moving=false;
  if(keys['ArrowLeft'])  {duck.x-=DUCK_SPD*dt;duck.right=false;moving=true;}
  if(keys['ArrowRight']) {duck.x+=DUCK_SPD*dt;duck.right=true; moving=true;}
  duck.x=Math.max(0,Math.min(VW-DUCK_W,duck.x));
  if(moving) duck.walkAnim+=dt*9;

  // Jump
  if(duck.jumping){
    duck.jumpT+=dt;
    var jt=Math.min(duck.jumpT/JUMP_DUR,1);
    duck.jumpOff=JUMP_H*4*jt*(1-jt);
    if(duck.jumpT>=JUMP_DUR){duck.jumping=false;duck.jumpOff=0;}
  }

  // Spawn
  if(now-lastSpawnTs>=spawnMs) spawnApple(now);

  // Rain milestone
  if(score>=rainMilestone){rainMilestone+=50;spawnRain();}

  // Apple loop
  for(var i=apples.length-1;i>=0;i--){
    var a=apples[i];
    a.x+=a.velX*dt;
    if(a.x<a.size){a.x=a.size;a.velX=Math.abs(a.velX);}
    if(a.x>VW-a.size){a.x=VW-a.size;a.velX=-Math.abs(a.velX);}

    if(a.bouncing){
      a.bounceV+=650*dt; a.y+=a.bounceV*dt;
      if(a.y+a.size>=GROUND_Y){if(a.type==='shield')shieldOnScreen=false;addSplat(a);apples.splice(i,1);continue;}
    } else { a.y+=a.spd*dt; }

    // Collision
    var dL=duck.x+3, dR=duck.x+DUCK_W-3;
    var dT=duck.y-duck.jumpOff+3, dB=duck.y-duck.jumpOff+DUCK_H-2;
    var aL=a.x-a.size*0.42, aR=a.x+a.size*0.42;
    var aT=a.y, aB=a.y+a.size;

    if(aR>dL&&aL<dR&&aB>dT&&aT<dB){
      if(a.type==='shield'){SND.shield();shieldActive=true;shieldTimer=3;shieldOnScreen=false;apples.splice(i,1);continue;}
      if(shieldActive){SND.shielded();combo=0;addSplat(a);if(a.type==='shield')shieldOnScreen=false;apples.splice(i,1);continue;}
      SND.death();
      if(score>highScore){highScore=score;localStorage.setItem('duckAppleHS',highScore);}
      state='dying';deathT=0;return;
    }

    // Ground hit
    if(!a.bouncing&&a.y+a.size>=GROUND_Y){
      if(a.type==='shield'){shieldOnScreen=false;addSplat(a);apples.splice(i,1);continue;}
      var prev=score;
      score+=a.pts*(comboX2?2:1);
      combo++;
      if(combo===10&&!comboX2){comboX2=true;comboFlashT=2.2;SND.combo();}
      if(a.type==='golden')SND.golden();else SND.land();
      if(Math.floor(score/10)>Math.floor(prev/10))SND.milestone();
      if(score>highScore){highScore=score;localStorage.setItem('duckAppleHS',highScore);}
      var distX=Math.abs(a.x-(duck.x+DUCK_W/2));
      if(distX<110){shakeT=0.13;shakeAmt=Math.max(2,5-distX/25);}
      addSplat(a);
      a.bouncing=true;a.bounceV=-(a.spd*0.42);a.y=GROUND_Y-a.size;a.velX=(Math.random()-0.5)*70;a.spd=0;
    }
  }

  for(var si=splats.length-1;si>=0;si--){splats[si].age+=dt;if(splats[si].age>=1.8)splats.splice(si,1);}
}

// ─── Draw helper ──────────────────────────────────────────
function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.round(x),Math.round(y),w,h);}

// ─── Draw: background ─────────────────────────────────────
function drawBG() {
  var sky=getSky(),nf=nightFactor();
  r(0,0,VW,150,sky[0]);r(0,150,VW,140,sky[1]);r(0,290,VW,125,sky[2]);
  if(nf>0.1){ctx.globalAlpha=nf*0.8;ctx.fillStyle='#FFFFFF';
    for(var si=0;si<STARS.length;si++)ctx.fillRect(STARS[si][0],STARS[si][1],2,2);ctx.globalAlpha=1;}
  if(nf>0.2){ctx.globalAlpha=Math.min(1,(nf-0.2)/0.3);
    r(670,28,32,32,'#CCCC88');r(672,30,28,28,'#DDDDAA');r(676,28,10,5,sky[0]);ctx.globalAlpha=1;}
  var cc=nf>0.5?'#1A2A4A':'#E0E8FF',ch=nf>0.5?'#222E50':'#FFFFFF';
  for(var ci=0;ci<CLOUDS.length;ci++){var c=CLOUDS[ci];
    r(c.x+c.w*0.2,c.y,c.w*0.6,c.h*0.55,cc);r(c.x,c.y+c.h*0.3,c.w,c.h*0.7,cc);
    r(c.x+c.w*0.12,c.y+c.h*0.1,c.w*0.28,c.h*0.45,ch);}
  if(windActive){var wa=Math.min(1,windTimer/0.4)*0.55;ctx.fillStyle='rgba(200,225,255,'+wa+')';
    for(var wi=0;wi<windStreaks.length;wi++){var ws=windStreaks[wi],d=windVel>0?1:-1;
      ctx.fillRect(Math.round(ws.x),Math.round(ws.y),Math.round(d*ws.len),2);
      ctx.fillRect(Math.round(ws.x+d*18),Math.round(ws.y+5),Math.round(d*ws.len*0.6),1);}}
  for(var ti=0;ti<TREES.length;ti++)drawTree(TREES[ti],nf);
}
function drawTree(t,nf){
  var x=t.x,th=t.th,cw=t.cw,ch=t.ch,tw=16,base=GROUND_Y,cx=x-cw/2,cy=base-th-ch+12;
  var trkC=nf>0.5?'#4A2A10':'#7A4A2A',trkD=nf>0.5?'#2A1000':'#5A3010';
  var cnB=nf>0.5?'#0A3312':'#1A6622',cnL=nf>0.5?'#0E4018':'#279933';
  var cnD=nf>0.5?'#061A09':'#0D4414',apC=nf>0.5?'#660000':'#CC3300';
  r(x-tw/2,base-th,tw,th,trkC);r(x-tw/2+4,base-th+8,4,th-14,trkD);
  r(cx,cy,cw,ch,cnB);r(cx+8,cy+6,18,16,cnL);r(cx+cw-28,cy+10,18,14,cnL);
  r(cx+10,cy+ch-24,22,18,cnL);r(cx,cy+ch-14,20,14,cnD);r(cx+cw-20,cy+ch-12,20,12,cnD);
  r(x-14,cy+ch*0.35,8,8,apC);r(x+8,cy+ch*0.55,6,6,apC);
  if(cw>86)r(x-22,cy+ch*0.6,7,7,apC);
}

// ─── Draw: ground ─────────────────────────────────────────
function drawGround(){
  var nf=nightFactor();
  r(0,GROUND_Y,VW,VH-GROUND_Y,nf>0.5?'#4A3018':'#7A5230');
  r(0,GROUND_Y,VW,GRASS_H,nf>0.5?'#1A5A1A':'#3AAA3A');
  for(var gx=0;gx<VW;gx+=16)r(gx,GROUND_Y,8,8,nf>0.5?'#145014':'#2A8A2A');
  for(var hx=6;hx<VW;hx+=22)r(hx,GROUND_Y-5,3,9,nf>0.5?'#287028':'#55CC55');
}

// ─── Draw: splats ─────────────────────────────────────────
function drawSplats(){
  for(var i=0;i<splats.length;i++){
    var s=splats[i],alpha=1-s.age/1.8,sz=Math.floor(s.sz*0.55);
    ctx.globalAlpha=alpha*0.85;ctx.fillStyle=s.col;
    ctx.fillRect(Math.round(s.x-sz),Math.round(s.y),sz*2,3);
    ctx.fillRect(Math.round(s.x-sz*0.5),Math.round(s.y+3),sz,2);
    ctx.fillRect(Math.round(s.x-sz*1.3),Math.round(s.y-1),4,4);
    ctx.fillRect(Math.round(s.x+sz*0.9),Math.round(s.y-1),4,4);
    ctx.fillRect(Math.round(s.x),Math.round(s.y+5),3,3);
    ctx.globalAlpha=1;
  }
}

// ─── Draw: shadows ────────────────────────────────────────
function drawShadows(){
  for(var i=0;i<apples.length;i++){
    var a=apples[i];if(a.bouncing)continue;
    var hA=Math.max(0,GROUND_Y-(a.y+a.size)),sc=1-Math.min(hA/(VH*0.9),0.88);
    var sw=a.size*1.7*sc,sh=Math.max(1,a.size*0.38*sc);
    ctx.globalAlpha=0.38*sc;ctx.fillStyle='#000000';
    ctx.fillRect(Math.round(a.x-sw/2),GROUND_Y+2,Math.round(sw),Math.round(sh));
    ctx.globalAlpha=1;
  }
}

// ─── Draw: apple ──────────────────────────────────────────
function drawApple(a){
  var x=Math.round(a.x-a.size/2),y=Math.round(a.y),s=a.size;
  if(a.type==='shield'){
    r(x+2,y+2,s-4,s-4,'#0055CC');r(x,y+4,2,s-8,'#0055CC');r(x+s-2,y+4,2,s-8,'#0055CC');
    r(x+4,y,s-8,2,'#0055CC');r(x+4,y+s-2,s-8,2,'#0055CC');
    r(x+s-2,y+4,2,s-8,'#003A99');r(x+4,y+s-2,s-8,2,'#003A99');r(x+4,y+4,4,4,'#4499FF');
    var mx=x+Math.floor(s/2);r(mx-2,y+4,4,s-8,'#AADDFF');r(x+4,y+Math.floor(s/2)-2,s-8,4,'#AADDFF');
    r(x-4,y+2,3,3,'#66BBFF');r(x+s+2,y+4,3,3,'#66BBFF');r(mx,y-8,3,3,'#66BBFF');return;
  }
  var gold=a.type==='golden',body=gold?'#FFAA00':'#CC2200',dark=gold?'#BB7700':'#991100',shine=gold?'#FFE080':'#FF5544';
  r(x+2,y+2,s-4,s-4,body);r(x,y+4,2,s-8,body);r(x+s-2,y+4,2,s-8,body);
  r(x+4,y,s-8,2,body);r(x+4,y+s-2,s-8,2,body);r(x+s-2,y+4,2,s-8,dark);r(x+4,y+s-2,s-8,2,dark);
  var sh=s>12?4:2;r(x+(s>12?4:2),y+(s>12?4:2),sh,sh,shine);
  var stx=x+Math.floor(s/2)-1;r(stx,y-4,3,5,'#3A2800');
  if(s>=16)r(stx+2,y-4,6,4,'#228B22');else r(stx+2,y-3,4,3,'#228B22');
  if(gold){r(x-4,y+2,3,3,'#FFEE44');r(x+s+2,y+4,3,3,'#FFEE44');r(x+Math.floor(s/2),y-8,3,3,'#FFEE44');}
}

// ─── Draw: duck ───────────────────────────────────────────
function drawDuck(){
  var bx,by,scaleY=1;
  if(state==='dying'){
    var t=deathT/0.45;scaleY=1-t*0.88;
    bx=Math.round(duck.x);by=Math.round(duck.y+t*DUCK_H*0.85);
  } else {
    bx=Math.round(duck.x+wiggleOff);   // wiggle offset applied here
    by=Math.round(duck.y-duck.jumpOff);
  }
  ctx.save();
  if(!duck.right){ctx.translate(bx+DUCK_W/2,0);ctx.scale(-1,1);ctx.translate(-(bx+DUCK_W/2),0);}
  if(scaleY!==1){ctx.translate(bx+DUCK_W/2,by+DUCK_H);ctx.scale(1,scaleY);ctx.translate(-(bx+DUCK_W/2),-(by+DUCK_H));}
  if(shieldActive){
    var pulse=0.35+Math.sin(Date.now()/90)*0.18;
    // Wiggle active: brighter/wider glow
    var glowCol = wiggleActive ? '#44CCFF' : '#0066FF';
    ctx.globalAlpha=pulse+(wiggleActive?0.15:0);
    r(bx-5,by-5,DUCK_W+10,DUCK_H+10,glowCol);ctx.globalAlpha=1;
  }
  r(bx,by+11,32,18,'#FFD700');r(bx+8,by,20,15,'#FFD700');
  r(bx+3,by+14,22,10,'#E5BE00');r(bx+2,by+22,22,6,'#FFE840');
  r(bx+28,by+5,8,5,'#FF8800');r(bx+29,by+9,7,2,'#CC5500');
  r(bx+22,by+4,4,4,'#111111');r(bx+24,by+4,2,2,'#FFFFFF');
  var ft=duck.jumping?0:Math.sin(duck.walkAnim)*2;
  r(bx+4,by+28+ft,11,3,'#FF8800');r(bx+16,by+28-ft,11,3,'#FF8800');
  ctx.restore();
}

// ─── Draw: HUD ────────────────────────────────────────────
function drawHUD(){
  ctx.font='bold 20px "Courier New", monospace';
  ctx.fillStyle='#000';ctx.fillText('SCORE: '+score,22,38);
  ctx.fillStyle='#FFF';ctx.fillText('SCORE: '+score,20,36);
  ctx.fillStyle='#000';ctx.fillText('BEST: '+highScore,22,62);
  ctx.fillStyle='#FFD700';ctx.fillText('BEST: '+highScore,20,60);

  var lvl=Math.floor(gameTime/60)+1;
  if(lvl>1){var lt='LVL '+lvl,ltw=ctx.measureText(lt).width;
    ctx.fillStyle='#000';ctx.fillText(lt,VW-ltw-18,38);
    ctx.fillStyle='#FF8800';ctx.fillText(lt,VW-ltw-20,36);}

  if(combo>=5&&!comboX2){var ct='COMBO: '+combo+' / 10',ctw=ctx.measureText(ct).width;
    ctx.fillStyle='#000';ctx.fillText(ct,VW/2-ctw/2+2,38);
    ctx.fillStyle='#FFAA00';ctx.fillText(ct,VW/2-ctw/2,36);}

  if(comboX2){var x2t='\u00D72 SCORE!',x2w=ctx.measureText(x2t).width;
    var x2p=0.8+Math.sin(Date.now()/130)*0.2;ctx.globalAlpha=x2p;
    ctx.fillStyle='#000';ctx.fillText(x2t,VW/2-x2w/2+2,38);
    ctx.fillStyle='#FF4400';ctx.fillText(x2t,VW/2-x2w/2,36);ctx.globalAlpha=1;}

  if(comboFlashT>0){ctx.font='bold 34px "Courier New", monospace';
    var ft2='10 COMBO! \u00D72 ACTIVATED!',ftw=ctx.measureText(ft2).width;
    var fa=Math.min(1,comboFlashT/0.4);ctx.globalAlpha=fa;
    ctx.fillStyle='#000';ctx.fillText(ft2,VW/2-ftw/2+3,VH/2-18+3);
    ctx.fillStyle='#FF4400';ctx.fillText(ft2,VW/2-ftw/2,VH/2-18);ctx.globalAlpha=1;
    ctx.font='bold 20px "Courier New", monospace';}

  if(shieldActive){var sp=0.75+Math.sin(Date.now()/180)*0.25;ctx.globalAlpha=sp;
    ctx.font='bold 18px "Courier New", monospace';
    var st2='SHIELD: '+Math.ceil(shieldTimer)+'s',stw=ctx.measureText(st2).width;
    ctx.fillStyle='#000';ctx.fillText(st2,VW-stw-18,62);
    ctx.fillStyle='#44AAFF';ctx.fillText(st2,VW-stw-20,60);ctx.globalAlpha=1;
    ctx.font='bold 20px "Courier New", monospace';}

  if(windActive){var wt=windVel>0?'>>> WIND >>>':'<<< WIND <<<',wtw=ctx.measureText(wt).width;
    ctx.globalAlpha=Math.min(1,windTimer/0.5)*0.85;ctx.fillStyle='#AADDFF';
    ctx.fillText(wt,VW/2-wtw/2,VH-28);ctx.globalAlpha=1;}

  if(rainWarnT>0){ctx.font='bold 30px "Courier New", monospace';
    var rt='\u26A1 APPLE STORM! \u26A1',rtw=ctx.measureText(rt).width;
    var ra=Math.min(1,rainWarnT/0.4)*(0.6+Math.sin(Date.now()/75)*0.4);ctx.globalAlpha=ra;
    ctx.fillStyle='#000';ctx.fillText(rt,VW/2-rtw/2+3,VH/2+3);
    ctx.fillStyle='#FF6600';ctx.fillText(rt,VW/2-rtw/2,VH/2);ctx.globalAlpha=1;
    ctx.font='bold 20px "Courier New", monospace';}
}

// ─── Draw: death screen ───────────────────────────────────
function drawDeathScreen(){
  ctx.fillStyle='rgba(0,0,0,0.74)';ctx.fillRect(0,0,VW,VH);
  ctx.font='bold 68px "Courier New", monospace';
  var t1='YOU DIED',tw1=ctx.measureText(t1).width;
  ctx.fillStyle='#660000';ctx.fillText(t1,VW/2-tw1/2+4,VH/2-50+4);
  ctx.fillStyle='#FF2222';ctx.fillText(t1,VW/2-tw1/2,VH/2-50);
  ctx.font='bold 22px "Courier New", monospace';
  var t2='SCORE: '+score,tw2=ctx.measureText(t2).width;
  ctx.fillStyle='#BBBBBB';ctx.fillText(t2,VW/2-tw2/2,VH/2+12);
  if(score>0&&score>=highScore){ctx.font='bold 18px "Courier New", monospace';
    var t3='\u2605 NEW HIGH SCORE \u2605',tw3=ctx.measureText(t3).width;
    ctx.fillStyle='#FFD700';ctx.fillText(t3,VW/2-tw3/2,VH/2+44);}
  var bx=BTN.x,by=BTN.y,bw=BTN.w,bh=BTN.h;
  r(bx+5,by+5,bw,bh,'#002800');r(bx,by,bw,bh,'#005500');
  r(bx,by,bw,7,'#00AA00');r(bx,by,7,bh,'#00AA00');
  r(bx+bw-7,by+7,7,bh-7,'#003300');r(bx+7,by+bh-7,bw-7,7,'#003300');
  ctx.font='bold 22px "Courier New", monospace';
  var bt='RESPAWN',btw=ctx.measureText(bt).width;
  ctx.fillStyle='#FFFFFF';ctx.fillText(bt,VW/2-btw/2,by+35);
}

// ─── B button cooldown DOM update ─────────────────────────
const bCdEl    = document.getElementById('b-cd');
const bLabelEl = document.getElementById('b-label');
const btnBEl   = document.getElementById('btn-b');
function updateBButton() {
  if (wiggleCooldown > 0) {
    bCdEl.style.height = (wiggleCooldown / WIGGLE_CD * 100) + '%';
    bLabelEl.textContent = Math.ceil(wiggleCooldown) + 's';
    btnBEl.classList.add('cooldown'); btnBEl.classList.remove('ready');
  } else {
    bCdEl.style.height = '0%';
    bLabelEl.textContent = 'B';
    btnBEl.classList.add('ready'); btnBEl.classList.remove('cooldown');
  }
}

// ─── Main loop ────────────────────────────────────────────
function loop(now) {
  update(now);
  updateBButton();
  ctx.imageSmoothingEnabled = false;

  if(shakeT>0){var sx=(Math.random()-0.5)*shakeAmt*2,sy=(Math.random()-0.5)*shakeAmt*2;
    ctx.save();ctx.translate(sx,sy);}

  drawBG();drawGround();drawSplats();drawShadows();
  for(var i=0;i<apples.length;i++)drawApple(apples[i]);
  drawDuck();drawHUD();
  if(state==='dead')drawDeathScreen();

  if(shakeT>0)ctx.restore();
  requestAnimationFrame(loop);
}

// ─── Touch / controller setup ─────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const ctrl    = document.getElementById('controller');

  if (isTouch) {
    ctrl.style.display = 'flex';
    // Double rAF ensures layout is complete before measuring wrap
    requestAnimationFrame(() => requestAnimationFrame(resize));
  } else {
    resize();
  }

  // ── D-pad: single-touch with slide support ───────────────
  const dpadWrap = document.getElementById('dpad-wrap');
  let dpadId = null;

  function dpadDir(touch) {
    const rect = dpadWrap.getBoundingClientRect();
    const dx   = touch.clientX - (rect.left + rect.width  / 2);
    const dy   = touch.clientY - (rect.top  + rect.height / 2);
    clearDpad();
    if (Math.abs(dx) >= Math.abs(dy)) {
      if (dx < 0) { keys['ArrowLeft']  = true; document.getElementById('dp-left').classList.add('pressed'); }
      else        { keys['ArrowRight'] = true; document.getElementById('dp-right').classList.add('pressed'); }
    } else {
      if (dy < 0) {
        // Up = jump
        document.getElementById('dp-up').classList.add('pressed');
        if (!duck.jumping && state === 'playing') { duck.jumping=true; duck.jumpT=0; SND.jump(); }
      } else {
        document.getElementById('dp-down').classList.add('pressed');
      }
    }
  }
  function clearDpad() {
    keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    ['dp-up','dp-down','dp-left','dp-right'].forEach(id => {
      var el = document.getElementById(id); if(el) el.classList.remove('pressed');
    });
  }

  dpadWrap.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.changedTouches[0]; dpadId = t.identifier; dpadDir(t);
  }, { passive: false });
  dpadWrap.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (var i=0;i<e.changedTouches.length;i++) {
      if (e.changedTouches[i].identifier === dpadId) { dpadDir(e.changedTouches[i]); break; }
    }
  }, { passive: false });
  dpadWrap.addEventListener('touchend', function(e) {
    e.preventDefault();
    for (var i=0;i<e.changedTouches.length;i++) {
      if (e.changedTouches[i].identifier === dpadId) { clearDpad(); dpadId=null; break; }
    }
  }, { passive: false });
  dpadWrap.addEventListener('touchcancel', function(e) { clearDpad(); dpadId=null; }, { passive: false });

  // ── A button: jump ───────────────────────────────────────
  const btnA = document.getElementById('btn-a');
  btnA.addEventListener('touchstart', function(e) {
    e.preventDefault(); btnA.classList.add('pressed');
    if (!duck.jumping && state === 'playing') { duck.jumping=true; duck.jumpT=0; SND.jump(); }
  }, { passive: false });
  btnA.addEventListener('touchend',   function(e) { e.preventDefault(); btnA.classList.remove('pressed'); }, { passive: false });
  btnA.addEventListener('touchcancel',function(e) { btnA.classList.remove('pressed'); }, { passive: false });

  // ── B button: wiggle shield ──────────────────────────────
  const btnB = document.getElementById('btn-b');
  btnB.addEventListener('touchstart', function(e) {
    e.preventDefault(); btnB.classList.add('pressed'); activateWiggle();
  }, { passive: false });
  btnB.addEventListener('touchend',   function(e) { e.preventDefault(); btnB.classList.remove('pressed'); }, { passive: false });
  btnB.addEventListener('touchcancel',function(e) { btnB.classList.remove('pressed'); }, { passive: false });
});

requestAnimationFrame(loop);
</script>
